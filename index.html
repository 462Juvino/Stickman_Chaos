<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stickman Chaos: Arena Ultimate</title>
    <style>
        :root { --orb-r: 600px; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #arena { width: 100vw; height: 100vh; position: relative; background: radial-gradient(circle at center, #4b6584 0%, #1c2836 100%); overflow: hidden; transition: box-shadow 0.5s, background 0.5s; }
        .grid-floor { position: absolute; bottom: -50%; left: -50%; width: 200%; height: 200%; background-image: linear-gradient(rgba(0, 255, 255, 0.15) 2px, transparent 2px), linear-gradient(90deg, rgba(0, 255, 255, 0.15) 2px, transparent 2px); background-size: 80px 80px; transform: perspective(600px) rotateX(75deg); z-index: 0; pointer-events: none; animation: moveGrid 3s linear infinite; transition: all 0.5s; }
        @keyframes moveGrid { 0% { transform: perspective(600px) rotateX(75deg) translateY(0); } 100% { transform: perspective(600px) rotateX(75deg) translateY(80px); } }

        #timer-display { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 45px; color: #fff; text-shadow: 0 0 20px #0ff; z-index: 1000; pointer-events: none; }
        #killfeed { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 6px; z-index: 2500; pointer-events: none; }
        .kill-entry { background: rgba(0,0,0,0.8); color: #fff; padding: 6px 12px; border-left: 4px solid #ff0050; border-radius: 4px; font-size: 14px; font-weight: bold; animation: slideIn 0.3s ease-out, fadeOut 0.5s ease-in 3.5s forwards; box-shadow: 0 0 10px rgba(255,0,80,0.5); }
        .gift-entry { border-left-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }

        /* CONTROLES DE ÁUDIO */
        #audio-controls { position: absolute; top: 15px; left: 15px; z-index: 50000; display: flex; gap: 10px; }
        .btn-audio { background: rgba(0,0,0,0.6); border: 2px solid; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; transition: 0.2s; color: white;}
        .btn-audio:hover { transform: scale(1.1); background: rgba(0,0,0,0.9); }
        #btn-music { border-color: #0ff; box-shadow: 0 0 10px #0ff; }
        #btn-sfx { border-color: #ff0050; box-shadow: 0 0 10px #ff0050; }

        .airdrop { position: absolute; width: 35px; height: 35px; background: #0f0; border: 3px solid #fff; box-shadow: 0 0 25px #0f0; z-index: 5; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 22px; animation: dropIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards, floatDrop 2s infinite alternate ease-in-out; }
        @keyframes dropIn { 0% { transform: translateY(-500px) scale(0.5) rotate(45deg); opacity: 0; } 100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } }
        @keyframes floatDrop { from { transform: translateY(0px); } to { transform: translateY(-10px); box-shadow: 0 0 40px #0f0; } }

        #announcer { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; color: #fff; text-shadow: 0 5px 0 #000, 0 0 30px #f00; z-index: 2000; pointer-events: none; text-align: center; white-space: nowrap; opacity: 0; font-style: italic; font-weight: 900; }
        .announce-anim { animation: announcePop 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes announcePop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; text-shadow: 0 5px 0 #000, 0 0 50px #ffea00; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }

        /* =====================================
           ESTRUTURA DO STICKMAN
           ===================================== */
        .stickman { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 10; transition: opacity 0.3s; width: 80px; height: 130px; justify-content: flex-end; transform-origin: bottom center; }
        .head { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #fff; position: absolute; top: 5px; box-shadow: 0 0 10px #000; background-color: #111; z-index: 10; transition: box-shadow 0.2s, border-color 0.2s; }
        .face-pic { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; background-size: cover; background-position: center; z-index: 2; }
        .name-tag { position: absolute; top: -15px; font-size: 10px; color: #fff; background: rgba(0,0,0,0.8); padding: 1px 4px; border-radius: 3px; white-space: nowrap; border: 1px solid #fff; z-index: 50; font-weight: bold; }
        .sprite-body { width: 100%; height: 90px; background-size: contain; background-repeat: no-repeat; background-position: center bottom; position: absolute; bottom: 0; z-index: 5; }

        .health-bar-container { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 50px; height: 5px; background: rgba(0,0,0,0.7); border: 1px solid #333; border-radius: 3px; overflow: hidden; z-index: 20; }
        .health-bar { height: 100%; width: 100%; background: #0f0; transition: width 0.12s linear, background 0.12s linear; }

        /* =====================================
           ANIMAÇÕES P1 E P2
           ===================================== */
        .type-p1 .sprite-body { background-image: url('assets_baixados/stickman_base_p1.webp'); }
        .type-p1.walking .sprite-body { animation: walkP1 0.4s infinite steps(1); }
        .type-p1.atk-anim .sprite-body { animation: atkP1 0.3s steps(1) forwards; }
        @keyframes walkP1 {
            0% { background-image: url('assets_baixados/stickman_base_p1.webp'); }
            33% { background-image: url('assets_baixados/stickman_walk_p1_frame2.webp'); }
            66% { background-image: url('assets_baixados/stickman_walk_p1_frame3.webp'); }
            100% { background-image: url('assets_baixados/stickman_walk_p1_frame4.webp'); }
        }
        @keyframes atkP1 {
            0% { background-image: url('assets_baixados/stickman_attack_p1_frame1.webp'); }
            50% { background-image: url('assets_baixados/stickman_attack_p1_frame2.webp'); }
            100% { background-image: url('assets_baixados/stickman_attack_p1_frame3.webp'); }
        }

        .type-p2 .sprite-body { background-image: url('assets_baixados/stickman_base_p2.webp'); }
        .type-p2.walking .sprite-body { animation: walkP2 0.4s infinite steps(1); }
        .type-p2.atk-anim .sprite-body { animation: atkP2 0.3s steps(1) forwards; }
        @keyframes walkP2 {
            0% { background-image: url('assets_baixados/stickman_base_p2.webp'); }
            33% { background-image: url('assets_baixados/stickman_walk_p2_frame2.webp'); }
            66% { background-image: url('assets_baixados/stickman_walk_p2_frame3.webp'); }
            100% { background-image: url('assets_baixados/stickman_walk_p2_frame4.webp'); }
        }
        @keyframes atkP2 {
            0% { background-image: url('assets_baixados/stickman_attack_p2_frame1.webp'); }
            50% { background-image: url('assets_baixados/stickman_attack_p2_frame2.webp'); }
            100% { background-image: url('assets_baixados/stickman_attack_p2_frame3.webp'); }
        }

        .stickman-boss.type-p1 .sprite-body, .stickman-titan.type-p1 .sprite-body { background-image: url('assets_baixados/stickman_armor_p1_base.webp'); }
        .stickman-boss.type-p1.walking .sprite-body, .stickman-titan.type-p1.walking .sprite-body { animation: walkArmorP1 0.4s infinite steps(1); }
        .stickman-boss.type-p1.atk-anim .sprite-body, .stickman-titan.type-p1.atk-anim .sprite-body { animation: atkArmorP1 0.3s steps(1) forwards; }
        @keyframes walkArmorP1 {
            0% { background-image: url('assets_baixados/stickman_armor_p1_base.webp'); transform: scaleX(1); }
            33% { background-image: url('assets_baixados/stickman_armor_p1_walk_frame2.webp'); transform: scaleX(-1); }
            66% { background-image: url('assets_baixados/stickman_armor_p1_walk_frame3.webp'); transform: scaleX(-1); }
            100% { background-image: url('assets_baixados/stickman_armor_p1_walk_frame4.webp'); transform: scaleX(1); }
        }
        @keyframes atkArmorP1 {
            0% { background-image: url('assets_baixados/stickman_armor_p1_attack_frame1.webp'); }
            50% { background-image: url('assets_baixados/stickman_armor_p1_attack_frame2.webp'); }
            100% { background-image: url('assets_baixados/stickman_armor_p1_attack_frame3.webp'); }
        }

        .stickman-boss.type-p2 .sprite-body, .stickman-titan.type-p2 .sprite-body { background-image: url('assets_baixados/stickman_armor_p2_base.webp'); }
        .stickman-boss.type-p2.walking .sprite-body, .stickman-titan.type-p2.walking .sprite-body { animation: walkArmorP2 0.4s infinite steps(1); }
        .stickman-boss.type-p2.atk-anim .sprite-body, .stickman-titan.type-p2.atk-anim .sprite-body { animation: atkArmorP2 0.3s steps(1) forwards; }
        @keyframes walkArmorP2 {
            0% { background-image: url('assets_baixados/stickman_armor_p2_base.webp'); }
            33% { background-image: url('assets_baixados/stickman_armor_p2_walk_frame2.webp'); }
            66% { background-image: url('assets_baixados/stickman_armor_p2_walk_frame3.webp'); }
            100% { background-image: url('assets_baixados/stickman_armor_p2_walk_frame4.webp'); }
        }
        @keyframes atkArmorP2 {
            0% { background-image: url('assets_baixados/stickman_armor_p2_attack_frame1.webp'); }
            50% { background-image: url('assets_baixados/stickman_armor_p2_attack_frame2.webp'); }
            100% { background-image: url('assets_baixados/stickman_armor_p2_attack_frame3.webp'); }
        }

        /* =====================================
           MODO ANGELICAL
           ===================================== */
        .stickman-angelical .sprite-body { background-image: url('assets_baixados/boss_angelical_base.webp'); transform: scaleX(-1); }
        .stickman-angelical.walking .sprite-body { animation: walkAngelical 0.5s infinite steps(1); }
        .stickman-angelical.atk-anim .sprite-body { animation: atkAngelical 0.4s steps(1) forwards; }
        @keyframes walkAngelical {
            0% { background-image: url('assets_baixados/boss_angelical_base.webp'); transform: scaleX(-1); }
            20% { background-image: url('assets_baixados/boss_angelical_walk_frame2.webp'); transform: scaleX(1); }
            40% { background-image: url('assets_baixados/boss_angelical_walk_frame3.webp'); transform: scaleX(1); }
            60% { background-image: url('assets_baixados/boss_angelical_walk_frame4.webp'); transform: scaleX(1); }
            80% { background-image: url('assets_baixados/boss_angelical_walk_frame5.webp'); transform: scaleX(1); }
            100% { background-image: url('assets_baixados/boss_angelical_base.webp'); transform: scaleX(-1); }
        }
        @keyframes atkAngelical {
            0% { background-image: url('assets_baixados/boss_angelical_attack_frame1.webp'); transform: scaleX(1); }
            25% { background-image: url('assets_baixados/boss_angelical_attack_frame2.webp'); transform: scaleX(1); }
            50% { background-image: url('assets_baixados/boss_angelical_attack_frame3.webp'); transform: scaleX(1); }
            75% { background-image: url('assets_baixados/boss_angelical_attack_frame4.webp'); transform: scaleX(1); }
            100% { background-image: url('assets_baixados/boss_angelical_attack_frame5.webp'); transform: scaleX(1); }
        }

        .stickman-angelical .head,
        .stickman-angelical .name-tag,
        .stickman-angelical .health-bar-container {
            transform: scale(0.7);
            transform-origin: center;
        }

        /* =====================================
           EFEITOS VISUAIS E PODERES
           ===================================== */
        .stickman.glow .sprite-body, .stickman.glow .head { filter: drop-shadow(0 0 5px #0f0) drop-shadow(0 0 10px #0f0); }
        .stickman.aura .sprite-body, .stickman.aura .head { filter: drop-shadow(0 0 8px #0ff) drop-shadow(0 0 20px #00f); }
        .crown { position: absolute; left: 50%; top: -35px; transform: translateX(-50%); font-size: 28px; pointer-events: none; z-index: 30; filter: drop-shadow(0 0 6px #ff0); }

        .projectile { position: absolute; width: 35px; height: 35px; background-image: url('assets_baixados/energy_orb.webp'); background-size: cover; border-radius: 50%; box-shadow: 0 0 12px 4px #0ff; z-index: 1000; pointer-events: none; animation: spinProj 0.5s linear infinite;}
        @keyframes spinProj { 100% { transform: rotate(360deg); } }

        .spark { position: absolute; width: 15px; height: 15px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #ffea00, 0 0 30px #ff0050; pointer-events: none; z-index: 200; animation: sparkBoom 0.25s ease-out forwards; }
        @keyframes sparkBoom { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .ghost { position: absolute; opacity: 0.4; pointer-events: none; filter: grayscale(50%) brightness(150%); z-index: 5; transition: opacity 0.4s ease-out, transform 0.4s ease-out; }
        .floating-text { position: absolute; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 500; text-shadow: 0px 2px 4px #000, 0px 0px 8px currentColor; animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; transform: translateX(-50%); }
        @keyframes floatUp { 0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -15px) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -45px) scale(1); opacity: 0; } }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-3px, 3px, 0); } 20%, 80% { transform: translate3d(4px, -3px, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 4px, 0); } 40%, 60% { transform: translate3d(6px, -4px, 0); } }
        .shockwave { position: absolute; border: 6px solid #0ff; border-radius: 50%; pointer-events: none; z-index: 50; animation: shock 0.4s ease-out forwards; transform: translate(-50%, -50%); box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff; }
        @keyframes shock { 0% { width: 0; height: 0; opacity: 1; border-width: 8px; } 100% { width: 250px; height: 250px; opacity: 0; border-width: 0px; } }
        .rage { filter: drop-shadow(0 0 15px #f00) drop-shadow(0 0 20px #f00); animation: rageShake 0.2s infinite; }
        @keyframes rageShake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(-2px, 0px) rotate(1deg); } }

        .bh { position: absolute; width: 250px; height: 250px; background: radial-gradient(circle, #000 20%, #80f 60%, transparent); border-radius: 50%; transform: translate(-50%, -50%); animation: bhSpin 2s linear forwards; pointer-events:none; z-index:1; mix-blend-mode: screen; box-shadow: 0 0 50px #80f; }
        @keyframes bhSpin { 0% { transform: translate(-50%,-50%) scale(0) rotate(0deg); opacity:1; } 90% { transform: translate(-50%,-50%) scale(1.5) rotate(1080deg); opacity:1; } 100% { transform: translate(-50%,-50%) scale(0) rotate(1440deg); opacity:0; } }
        .heal-zone { position: absolute; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,0,0.3) 0%, transparent 70%); transform: translate(-50%, -50%); z-index: 1; pointer-events: none; animation: pulseHZ 1s infinite alternate; }
        @keyframes pulseHZ { 0%{transform:translate(-50%,-50%) scale(0.9);} 100%{transform:translate(-50%,-50%) scale(1.1);} }
        .lightning { position: absolute; width: 12px; height: 100vh; background: #fff; box-shadow: 0 0 30px 10px #0ff; transform: translateX(-50%); z-index: 90; pointer-events: none; animation: zap 0.4s ease-out forwards; }
        @keyframes zap { 0%{opacity:1; width:20px;} 100%{opacity:0; width:0px;} }
        .flash { position: absolute; width: 100vw; height: 100vh; background: #fff; z-index: 999; pointer-events: none; animation: screenFlash 0.3s ease-out forwards; }
        @keyframes screenFlash { 0%{opacity:0.8;} 100%{opacity:0;} }
        .meteor { position: absolute; width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px #ff3300, -30px -30px 40px #ffea00; z-index: 95; pointer-events: none; animation: mFall 0.8s linear forwards; }
        @keyframes mFall { 0%{ transform: translate(300px, -300px) scale(1); opacity:1; } 95%{ transform: translate(0,0) scale(1); opacity:1; } 100%{ transform: translate(0,0) scale(2); opacity:0; } }
        .jump-anim { animation: jumpSlam 0.8s ease-in-out forwards; z-index: 99 !important; }
        @keyframes jumpSlam { 0% { transform: translateY(0) scale(1); } 40% { transform: translateY(-300px) scale(1.5); } 80% { transform: translateY(-300px) scale(1.5); } 100% { transform: translateY(0) scale(1); } }
        .drone { position: absolute; width: 12px; height: 12px; background: #0ff; border-radius: 50%; box-shadow: 0 0 15px #0ff, 0 0 30px #fff; top: -60px; left: 35px; animation: droneFloat 1.5s infinite alternate ease-in-out; }
        @keyframes droneFloat { 0%{transform:translateY(0) translateX(0);} 100%{transform:translateY(15px) translateX(-15px);} }
        .bounty-target { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 28px; animation: pulseBounty 0.5s infinite alternate; pointer-events: none; z-index: 40; filter: drop-shadow(0 0 8px red); }
        @keyframes pulseBounty { 0% { transform: translateX(-50%) scale(1); opacity: 1; } 100% { transform: translateX(-50%) scale(1.3); opacity: 0.6; } }
        .orbital-warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 6px dashed #f00; border-radius: 50%; background: rgba(255,0,0,0.15); animation: owPulse 0.5s infinite alternate; z-index: 1; pointer-events: none; width: var(--orb-r); height: var(--orb-r); }
        @keyframes owPulse { 0% { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); } 100% { background: rgba(255,0,0,0.3); border-color: #f00; box-shadow: 0 0 50px #f00 inset; } }
        .orbital-blast { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, #fff 10%, #f00 60%, transparent); box-shadow: 0 0 150px #f00; z-index: 2000; animation: orbBlast 1s ease-out forwards; pointer-events: none; }
        @keyframes orbBlast { 0% { width: 0; height: 0; opacity: 1; } 15% { width: calc(var(--orb-r) * 1.1); height: calc(var(--orb-r) * 1.1); opacity: 1; } 100% { width: calc(var(--orb-r) * 1.2); height: calc(var(--orb-r) * 1.2); opacity: 0; } }

        /* =====================================
           MODO SERRA COM SPRITE DE FOGO / DOURADO
           ===================================== */
        .saw-mode .sprite-body { opacity: 0 !important; }
        .saw-mode .head::before {
            content: ''; position: absolute; top: -45px; left: -45px; right: -45px; bottom: -45px;
            background-image: url('assets_baixados/saw_blade_fire.webp'); background-size: cover; background-position: center; border-radius: 50%;
            z-index: -1; animation: spinSaw 0.1s linear infinite;
        }
        .stickman-boss.saw-mode .head { filter: drop-shadow(0 0 15px #ff0050) drop-shadow(0 0 30px #ff5500); }

        .stickman-titan.saw-mode .head::before { filter: hue-rotate(180deg) brightness(1.5) !important; }
        .stickman-titan.saw-mode .head { filter: drop-shadow(0 0 20px #00ffff) drop-shadow(0 0 40px #0000ff) !important; }

        .stickman-angelical.saw-mode .head::before { filter: hue-rotate(50deg) brightness(2.5) saturate(0.5) !important; }
        .stickman-angelical.saw-mode .head { filter: drop-shadow(0 0 20px #ffffff) drop-shadow(0 0 40px #ffd700) !important; }

        @keyframes spinSaw { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ESTILO DO BOSS E TITÃ E ANGELICAL */
        .stickman-boss { z-index: 9999; color: #ff0000 !important; }
        .stickman-boss .head { border: 4px solid #ff0000 !important; box-shadow: 0 0 20px #cc0000, 0 0 40px #ff4400, 0 0 80px rgba(255, 68, 0, 0.6) !important; animation: bossBurn 1s infinite alternate; }
        @keyframes bossBurn { 0% { box-shadow: 0 0 20px #cc0000, 0 0 40px #ff4400, 0 0 80px rgba(255, 68, 0, 0.6) !important; } 100% { box-shadow: 0 0 30px #cc0000, 0 0 60px #ff0000, 0 0 120px rgba(255, 0, 0, 0.9) !important; border-color: #ff4400 !important; } }

        .stickman-titan { z-index: 10000; color: #fff !important; }
        .stickman-titan .head { border: 4px solid #0ff !important; box-shadow: 0 0 30px #0ff, 0 0 60px #00f, 0 0 100px #fff !important; animation: titanBurn 1s infinite alternate; }
        @keyframes titanBurn { 0% { box-shadow: 0 0 30px #0ff, 0 0 60px #00f, 0 0 100px #fff !important; } 100% { box-shadow: 0 0 50px #0ff, 0 0 80px #fff, 0 0 150px #00f !important; border-color: #fff !important; } }

        .stickman-angelical { z-index: 10001; color: #fff !important; }
        .stickman-angelical .head { border: 4px solid #ffd700 !important; box-shadow: 0 0 30px #ffd700, 0 0 60px #fff, 0 0 100px #ffea00 !important; animation: angelBurn 1s infinite alternate; }
        @keyframes angelBurn { 0% { box-shadow: 0 0 30px #ffd700, 0 0 60px #fff, 0 0 100px #ffea00 !important; } 100% { box-shadow: 0 0 50px #ffd700, 0 0 80px #fff, 0 0 150px #ffea00 !important; border-color: #fff !important; } }

        /* =====================================
           TELA FINAL / PÓDIO (Z-INDEX GIGANTE)
           ===================================== */
        #end-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        #end-screen h1 { color: #d4af37; font-size: 55px; text-shadow: 0 0 30px #d4af37; margin-bottom: 50px; text-transform: uppercase; animation: popIn 1s forwards; }

        .podium-container { display: flex; align-items: flex-end; gap: 30px; height: 400px; margin-bottom: 20px;}
        .podium-place { display: flex; flex-direction: column; align-items: center; width: 160px; animation: riseUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; transform: translateY(100px); position: relative; }

        .podium-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 0 20px #fff; background: #333; margin-bottom: 10px; z-index: 50;}
        .podium-name { font-size: 20px; font-weight: bold; text-align: center; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; width: 100%; text-shadow: 0 2px 4px #000; z-index: 50; }

    <script>
        // 🛡️ TRAVA RDM STUDIO: Verifica a licença no momento que o jogo abre
        // Puxa primeiro a versão com PONTO, se não achar, usa a antiga por segurança
        window.rdmUser = localStorage.getItem('rdm_user_tiktok') || localStorage.getItem('rdm_user');
        window.rdmPerfil = localStorage.getItem('rdm_perfil');

        if (!window.rdmUser || !window.rdmPerfil) {
            document.body.innerHTML = "<div style='display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#000; z-index:999999; position:relative;'><h1 style='color:#ef4444; text-shadow:0 0 20px #ef4444; font-family:Arial;'>ACESSO NEGADO</h1><p style='color:#ccc; font-size:20px; font-family:Arial;'>Você precisa estar logado na RDM Studio para jogar.</p></div>";
            window.stop();
        }

        // 🇷🇺 API RUSSA: Cache e Busca de Fotos em Alta Qualidade
        let avatar_cache = {};
        async function obterAvatarRusso(nick, urlRecebida) {
            if (avatar_cache[nick] && !avatar_cache[nick].includes("dicebear")) return avatar_cache[nick];
            if (urlRecebida && !urlRecebida.includes("dicebear")) { avatar_cache[nick] = urlRecebida; return urlRecebida; }
            try {
                let res = await fetch(`https://www.tikwm.com/api/user/info?unique_id=${nick}`);
                let json = await res.json();
                if (json && json.data && json.data.user && json.data.user.avatarLarger) {
                    avatar_cache[nick] = json.data.user.avatarLarger; return avatar_cache[nick];
                }
            } catch(e) {}
            let fallback = `https://api.dicebear.com/7.x/bottts/svg?seed=${nick}`;
            avatar_cache[nick] = fallback; return fallback;
        }

        const arena = document.getElementById('arena'); const slashSound = document.getElementById('slashSound');
        const timerDisplay = document.getElementById('timer-display'); const announcerEl = document.getElementById('announcer'); const endScreen = document.getElementById('end-screen'); const killfeedEl = document.getElementById('killfeed');

        let stickmen = {}; let gameActive = false; let timeLeft = 0; let firstBloodDone = false; let botIndex = 1;
        let activeAirdrops = []; let currentTop1Name = "";
        let globalTimerInterval = null;
        let activeTheme = 'normal';

        let musicMuted = false;
        let sfxMuted = false;

        const MAX_LIFE = 1200; const LIFE_PER_HIT = 250; const BASE_SPEED = 3.0; const LOW_LIFE_SPEED_FACTOR = 0.5; const RESPAWN_TAPS_REQUIRED = 10;

        let dynAngelicalScale = 4.5;
        let dynTitanScale = 3.0;
        let dynBossScale = 2.0;
        let dynNormalBase = 0.7;
        let dynNormalMax = 1.4;

        function recalcScales() {
            let maxH = window.innerHeight * 0.85; // 85% da altura da tela

            // O Angelical ocupa exatamente os 85% (Ajustado para o eixo de 140px do boneco)
            dynAngelicalScale = maxH / 140;
            // O Titã fica com 75% do tamanho do Angelical
            dynTitanScale = dynAngelicalScale * 0.75;
            // O Boss fica com 55% do tamanho do Angelical
            dynBossScale = dynAngelicalScale * 0.55;

            // Bonecos normais crescem até 35% do Angelical
            dynNormalMax = dynAngelicalScale * 0.35;
            // O tamanho inicial base agora é 22% do Angelical (Quase o DOBRO do antigo!)
            dynNormalBase = dynAngelicalScale * 0.22;

            for(let id in stickmen) {
                let s = stickmen[id];
                if(s.isAngelical) s.scale = dynAngelicalScale;
                else if(s.isTitan) s.scale = dynTitanScale;
                else if(s.isBoss) s.scale = dynBossScale;
                else s.scale = Math.min(dynNormalMax, dynNormalBase + (s.tapCount * 0.015) + (s.powerups.size ? (dynNormalMax-dynNormalBase)/2 : 0));

                // Força a atualização visual imediata caso a janela seja redimensionada
                if (s.el) s.el.style.transform = `translate(${s.x}px, ${s.y}px) scale(${s.scale}) scaleX(${s.facing})`;
            }
        }

        function resizeCanvas() {
            document.documentElement.style.setProperty('--orb-r', (Math.min(window.innerWidth, window.innerHeight) * 0.7) + 'px');
            recalcScales();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let cfgGifts = { t1: 1, t2: 5, t3: 10, t4: 20, boss: 50, titan: 150, angelical: 300, multiBoss: false };
        let hostProfile = { name: "Clone", avatar: "" };

        try {
            let savedGift = localStorage.getItem('gift_config'); if(savedGift) cfgGifts = JSON.parse(savedGift);
            let savedHost = localStorage.getItem('host_profile'); if(savedHost) { hostProfile = JSON.parse(savedHost); if(!hostProfile.name) hostProfile.name = "Clone"; }
        } catch(e){}

        function applyGiftConfig(config) { cfgGifts = config; }
        function applyHostProfile(config) {
            hostProfile = config;
            if(!hostProfile.name) hostProfile.name = "Clone";
            Object.values(stickmen).forEach(s => {
                if (s.isBot) {
                    s.displayName = hostProfile.name;
                    s.avatarUrl = hostProfile.avatar ? `https://wsrv.nl/?url=${encodeURIComponent(hostProfile.avatar)}&w=100&h=100&fit=cover` : '';
                    let nameTag = s.el.querySelector('.name-tag'); if (nameTag) nameTag.innerText = s.displayName;
                    if(s.avatarUrl) s.head.querySelector('.face-pic').style.backgroundImage = `url('${s.avatarUrl}')`; else s.head.querySelector('.face-pic').style.backgroundImage = 'none';
                }
            });
        }

        setTimeout(() => { requestAnimationFrame(update); }, 500);

        function toggleMusic() {
            musicMuted = !musicMuted;
            document.getElementById('bgMusic').muted = musicMuted;
            document.getElementById('bossMusic').muted = musicMuted;
            document.getElementById('titanMusic').muted = musicMuted;
            document.getElementById('angelicalMusic').muted = musicMuted;

            let btn = document.getElementById('btn-music');
            btn.innerText = musicMuted ? '🔇' : '🎵';
            btn.style.borderColor = musicMuted ? '#555' : '#0ff';
            btn.style.boxShadow = musicMuted ? 'none' : '0 0 10px #0ff';
        }

        function toggleSFX() {
            sfxMuted = !sfxMuted;
            let btn = document.getElementById('btn-sfx');
            btn.innerText = sfxMuted ? '🔈' : '🔊';
            btn.style.borderColor = sfxMuted ? '#555' : '#ff0050';
            btn.style.boxShadow = sfxMuted ? 'none' : '0 0 10px #ff0050';
        }

        function pararMusicas() {
            document.getElementById('bgMusic').pause(); document.getElementById('bgMusic').currentTime = 0;
            document.getElementById('bossMusic').pause(); document.getElementById('bossMusic').currentTime = 0;
            document.getElementById('titanMusic').pause(); document.getElementById('titanMusic').currentTime = 0;
            document.getElementById('angelicalMusic').pause(); document.getElementById('angelicalMusic').currentTime = 0;
            activeTheme = 'normal';
        }

        function iniciarPartidaRemota(tempoEmSegundos) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            gameActive = false; clearInterval(globalTimerInterval);
            pararMusicas();

            stickmen = {}; activeAirdrops = []; currentTop1Name = "";
            arena.style.boxShadow = "none";
            arena.style.background = "radial-gradient(circle at center, #4b6584 0%, #1c2836 100%)";
            arena.innerHTML = '<div class="grid-floor"></div>'; killfeedEl.innerHTML = ''; endScreen.style.display = 'none';
            timeLeft = tempoEmSegundos; atualizarRelogioNaTela(timeLeft); gameActive = true; firstBloodDone = false;

            document.getElementById('bgMusic').volume = 0.2;
            document.getElementById('bgMusic').play().catch(()=>{});
            triggerAnnouncer("FIGHT!");

            globalTimerInterval = setInterval(() => {
                if(!gameActive) { clearInterval(globalTimerInterval); return; }
                timeLeft--; atualizarRelogioNaTela(timeLeft);
                if(timeLeft === 15) { playSFX(sirenSound); triggerAnnouncer("⚠️ ATAQUE ORBITAL! ⚠️", nukeSound); let ow = document.createElement('div'); ow.id = 'ow-marker'; ow.className = 'orbital-warning'; arena.appendChild(ow); }
                if(timeLeft === 12) { let ow = document.getElementById('ow-marker'); if(ow) ow.remove(); playSFX(laserBlastSound); triggerScreenShake(); let ob = document.createElement('div'); ob.className = 'orbital-blast'; arena.appendChild(ob); let cx = window.innerWidth/2, cy = window.innerHeight/2; let radius = Math.min(window.innerWidth, window.innerHeight) * 0.35; for(let id in stickmen) { let s = stickmen[id]; if(!s.dead && Math.hypot(s.x-cx, s.y-cy) <= radius) { aplicarDano(s, 5000, null, true); s.kbX = (s.x-cx)*0.2; s.kbY = (s.y-cy)*0.2; } } setTimeout(()=>ob.remove(), 1000); }
                if(timeLeft <= 0) { clearInterval(globalTimerInterval); endGame(); }
            }, 1000);
        }

        function encerrarPartidaRemota() {
            if(gameActive) { timeLeft = 0; atualizarRelogioNaTela(0); clearInterval(globalTimerInterval); endGame(); }
        }

        function atualizarRelogioNaTela(segundos) { let m = Math.floor(segundos/60); let s = segundos%60; timerDisplay.innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`; }

        function playSFX(audioEl) {
            if (!gameActive || !audioEl || sfxMuted) return;
            const clone = audioEl.cloneNode();
            clone.volume = 0.4;
            clone.play().catch(() => {});
        }

        function triggerAnnouncer(text, soundEl) {
            if(soundEl) playSFX(soundEl);
            announcerEl.innerText = text;
            announcerEl.classList.remove('announce-anim');
            void announcerEl.offsetWidth;
            announcerEl.classList.add('announce-anim');
            triggerScreenShake();
        }

        function narrarInteracao(text) {
            // Narrador genérico de voz robótica completamente desativado. Mantendo apenas SFX.
            console.log("Narrador:", text);
        }

        function addGiftNotification(nome, poder) { let ke = document.createElement('div'); ke.className = 'kill-entry gift-entry'; ke.innerHTML = `🎁 <span style="color:#ffd700">${nome}</span> ativou <b style="color:#0ff">${poder}</b>!`; killfeedEl.appendChild(ke); setTimeout(() => { if(ke.parentNode) ke.remove(); }, 5000); }
        function randomSpawn() { return { x: (Math.random() * 0.6 + 0.2) * window.innerWidth, y: (Math.random() * 0.6 + 0.2) * window.innerHeight }; }
        function spawnFloatingText(x, y, text, color) { const el = document.createElement('div'); el.className = 'floating-text'; el.innerText = text; el.style.color = color; el.style.left = x + 'px'; el.style.top = y + 'px'; arena.appendChild(el); setTimeout(() => el.remove(), 800); }
        function triggerScreenShake() { arena.classList.remove('shake'); void arena.offsetWidth; arena.classList.add('shake'); setTimeout(() => arena.classList.remove('shake'), 300); }

            if(!gameActive) return;
            let players = Object.values(stickmen).map(s => ({ id: s.id, name: s.displayName, avatar: s.avatarUrl, score: s.score, kills: s.kills || 0, diamonds: s.totalDiamonds || 0, isBot: s.isBot, dead: s.dead }));
            let topPower = [...players].sort((a, b) => b.score - a.score).slice(0, 5);
            let topKills = [...players].sort((a, b) => b.kills - a.kills).slice(0, 5);
            let topDonors = [...players].sort((a, b) => b.diamonds - a.diamonds).slice(0, 5);

            localStorage.setItem('stickman_rank', JSON.stringify(topPower));
            localStorage.setItem('stickman_kill', JSON.stringify(topKills));
            localStorage.setItem('stickman_donors', JSON.stringify(topDonors));

            let vivosDonors = topDonors.filter(p => !p.dead);

            if (cfgGifts.multiBoss === false) {
                let supremeId = null;
                let angels = vivosDonors.filter(p => p.diamonds >= cfgGifts.angelical);
                let titans = vivosDonors.filter(p => p.diamonds >= cfgGifts.titan && p.diamonds < cfgGifts.angelical);
                let bosses = vivosDonors.filter(p => p.diamonds >= cfgGifts.boss && p.diamonds < cfgGifts.titan);

                if (angels.length > 0) supremeId = angels[0].id;
                else if (titans.length > 0) supremeId = titans[0].id;
                else if (bosses.length > 0) supremeId = bosses[0].id;

                        if (!s.dead) grantBossOrTitan(s);
                    } else {
                        if (s.isBoss || s.isTitan || s.isAngelical) removeBoss(s);

                }
            } else {

                    }
                }
            }

            let top1Id = topPower.length > 0 && topPower[0].score > 0 ? topPower[0].id : null;

        // 2. Processador Unificado de Eventos (Lê a Nuvem e o TikFinity, usando API Russa)
        async function processarEventoDaAPI(d) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let evento = d.event; let dados = d.data;
            if(!dados || !gameActive) return;

            let nick = (dados.nickname || dados.uniqueId || dados.userId || "").trim();
            if (!nick || nick.toLowerCase() === "none") return;

            let raw_avatar = dados.profilePictureUrl || dados.avatar || dados.profilePicture;
            let avatar_url = await obterAvatarRusso(nick, raw_avatar);

            dados.uniqueId = nick;
            dados.displayName = dados.nickname || nick;
            dados.profilePictureUrl = avatar_url;

            if (!stickmen[nick]) createStickman(dados);

            let id = nick;

            if (evento === "like") {
                let qtdLikes = parseInt(dados.likeCount || dados.likes || dados.count || 1);
                if (stickmen[id].dead) { stickmen[id].respawnTaps += qtdLikes; tentarRespawn(stickmen[id]); }
                else { stickmen[id].score += (5 * qtdLikes); stickmen[id].tapCount += qtdLikes; }
            }

            if (evento === "gift") {
                let diamonds = parseInt(dados.diamondCount || dados.diamonds || 1);
                stickmen[id].hasGifted = true; stickmen[id].totalDiamonds += diamonds;

                if (stickmen[id].dead) {
                    stickmen[id].respawnTaps += (diamonds * 10); tentarRespawn(stickmen[id]);
                } else {
                    stickmen[id].score += (diamonds * 1500); stickmen[id].hitsTomados = 0; stickmen[id].life = Math.min(stickmen[id].maxLifeReal, stickmen[id].life + 400); atualizarBarraDeVida(stickmen[id]);
                }

                atualizarNivelPoder(stickmen[id]);

                if (diamonds >= cfgGifts.angelical) narrarInteracao(`MILAGRE! ${stickmen[id].displayName} mandou um presente lendário e ascendeu ao Modo Angelical!`);
                else if (diamonds >= cfgGifts.titan) narrarInteracao(`O impossível aconteceu! ${stickmen[id].displayName} virou TITÃ SUPREMO!`);
                else if (diamonds >= cfgGifts.boss) narrarInteracao(`Incrível! ${stickmen[id].displayName} virou o Chefão!`);
                else narrarInteracao(`Muito obrigado ${stickmen[id].displayName} pelo presente!`);

                if (diamonds >= cfgGifts.t2 && diamonds < cfgGifts.t3) { addGiftNotification(stickmen[id].displayName, "Oásis de Cura"); triggerHealingZone(); }
                else if (diamonds >= cfgGifts.t3 && diamonds < cfgGifts.t4) { addGiftNotification(stickmen[id].displayName, "Raios"); triggerThunderstorm(); }
                else if (diamonds >= cfgGifts.t4) { addGiftNotification(stickmen[id].displayName, "Meteoros"); triggerMeteorShower(); }
            }

        function conectarNuvem() {

            if (conexaoNuvemEstabelecida && lastTiktokUser === targetUser) return;

            // ⚠️ A CORREÇÃO DE LOOP: Impede que o jogo cancele a conexão enquanto a torre acorda!
            if (wsNuvem && wsNuvem.readyState === WebSocket.CONNECTING) return;

            if (wsNuvem) wsNuvem.close();

            lastTiktokUser = targetUser;
            console.log(`☁️ Tentando Nuvem para: @${targetUser}... (Aguardando resposta)`);

            wsNuvem = new WebSocket("wss://torre-de-controle-rdm.onrender.com:443/");

            wsNuvem.onopen = () => {
                conexaoNuvemEstabelecida = true;
                console.log(`✅ NUVEM CONECTADA! Escutando: @${targetUser}`);

                // ⚠️ A PROVA VISUAL NO STICKMAN CHAOS (Usamos o letreiro gigante da arena)
                triggerAnnouncer(`☁️ NUVEM LIGADA! (@${targetUser})`);
            };

            wsNuvem.onmessage = (event) => { try { processarEventoDaAPI(JSON.parse(event.data)); } catch(e) {} };

            wsNuvem.onclose = () => { conexaoNuvemEstabelecida = false; wsNuvem = null; };
        }

        function verificarEConectar() {
            if (!wsTikfinity || wsTikfinity.readyState === WebSocket.CLOSED) {
                wsTikfinity = new WebSocket("ws://127.0.0.1:21213/");
                wsTikfinity.onopen = () => {
                    console.log("✅ TikFinity Local Conectado!");
                    if (wsNuvem) { wsNuvem.close(); wsNuvem = null; conexaoNuvemEstabelecida = false; }
                };
                wsTikfinity.onmessage = (event) => { try { processarEventoDaAPI(JSON.parse(event.data)); } catch(e) {} };
                wsTikfinity.onerror = () => { conectarNuvem(); };
                wsTikfinity.onclose = () => { wsTikfinity = null; };
            } else if (wsTikfinity.readyState === WebSocket.OPEN) {
                if (wsNuvem) { wsNuvem.close(); wsNuvem = null; conexaoNuvemEstabelecida = false; }
            }
        }
        setInterval(verificarEConectar, 2000);

        function spawnBot() {
            let bId = 'Clone_' + botIndex++;
            createStickman({ uniqueId: bId, displayName: hostProfile.name || 'Clone', profilePictureUrl: hostProfile.avatar, isBot: true });
        }
        function forceGift() {
            let vivos = Object.values(stickmen).filter(s => !s.dead);
            if(vivos.length > 0) {
                let p = vivos.find(s => s.isBot) || vivos[0];
                p.totalDiamonds += cfgGifts.t1; atualizarNivelPoder(p); addGiftNotification(p.displayName, "Poder de Teste");
            }
        }
        function forceBoss() {
            let vivos = Object.values(stickmen).filter(s => !s.dead && !s.isBoss && !s.isTitan && !s.isAngelical);
            if(vivos.length === 0) vivos = Object.values(stickmen).filter(s => !s.dead);
            if(vivos.length > 0) {
                let p = vivos.find(s => s.isBot) || vivos[0];
                let maxDiamantes = Math.max(0, ...Object.values(stickmen).map(s => s.totalDiamonds));
                let titanPrice = cfgGifts.titan || 150; let novaQtd = Math.max(maxDiamantes + 1, cfgGifts.boss);
                if (novaQtd >= titanPrice) novaQtd = titanPrice - 1;
                p.totalDiamonds = novaQtd;
                syncRankings();
            }
        }
        function forceTitan() {
            let vivos = Object.values(stickmen).filter(s => !s.dead && !s.isTitan && !s.isAngelical);
            if(vivos.length === 0) vivos = Object.values(stickmen).filter(s => !s.dead);
            if(vivos.length > 0) {
                let p = vivos.find(s => s.isBot) || vivos[0];
                let maxDiamantes = Math.max(0, ...Object.values(stickmen).map(s => s.totalDiamonds));
                let angelPrice = cfgGifts.angelical || 300; let novaQtd = Math.max(maxDiamantes + 1, cfgGifts.titan);
                if (novaQtd >= angelPrice) novaQtd = angelPrice - 1;
                p.totalDiamonds = novaQtd;
                syncRankings();
            }
        }
        function forceAngelical() {
            let vivos = Object.values(stickmen).filter(s => !s.dead && !s.isAngelical);
            if(vivos.length === 0) vivos = Object.values(stickmen).filter(s => !s.dead);
            if(vivos.length > 0) {
                let p = vivos.find(s => s.isBot) || vivos[0];
                let maxDiamantes = Math.max(0, ...Object.values(stickmen).map(s => s.totalDiamonds));
                p.totalDiamonds = Math.max(maxDiamantes, cfgGifts.angelical) + 1;
                syncRankings();
            }
        }

        document.addEventListener('keydown', function(e) {
            if(audioCtx.state === 'suspended') audioCtx.resume(); const key = e.key.toLowerCase();
            if (key === 'q' || key === 'e' || key === 'r') {
                const id = key === 'q' ? 'BootQ' : key === 'e' ? 'BootE' : 'BootR';
                if (!stickmen[id]) { createStickman({ uniqueId: id, displayName: hostProfile.name || 'Clone', profilePictureUrl: hostProfile.avatar, isBot: true }); }
                else { const s = stickmen[id]; if (s.dead) { s.respawnTaps++; tentarRespawn(s); } else { s.tapCount = (s.tapCount || 0) + 1; if(!s.isBoss && !s.isTitan && !s.isAngelical) { s.aggressiveness = Math.max(220, s.aggressiveness - 30); s.scale = Math.min(dynNormalMax, dynNormalBase + (s.tapCount * 0.015)); } } }
            }
            if (key === 'b') { forceBoss(); }
            if (key === 't') { forceTitan(); }
            if (key === 'g') { forceAngelical(); }
        });

        // ==========================================
        // 📡 RECEPTOR SAAS: LÊ COMANDOS DO PAINEL HOST
        // ==========================================
        window.addEventListener('storage', function(e) {
            if (e.key === 'stickmanCommand' && e.newValue) {
                let cmd = JSON.parse(e.newValue);

                // Mapeia o comando do Painel para a Função Real do Jogo
                if (cmd.action === 'update_gift_config') applyGiftConfig(cmd.value);
                if (cmd.action === 'update_host_profile') applyHostProfile(cmd.value);
                if (cmd.action === 'host_start_match') iniciarPartidaRemota(cmd.value);
                if (cmd.action === 'host_end_match') encerrarPartidaRemota();
                if (cmd.action === 'host_action') {
                    if (cmd.value === 'spawnBot') spawnBot();
                    else if (cmd.value === 'forceGift') forceGift();
                    else if (cmd.value === 'forceBoss') forceBoss();
                    else if (cmd.value === 'forceTitan') forceTitan();
                    else if (cmd.value === 'forceAngelical') forceAngelical();
                    else if (cmd.value === 'triggerMeteorShower') triggerMeteorShower();
                }
            }
        });
    </script>
</body>
