<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0f141e; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; overflow-x: hidden;}
        h1 { color: #0ff; margin-bottom: 10px; font-size: 20px; text-transform: uppercase; text-shadow: 0 0 10px #0ff; }

        .box-panel { background: #000; border: 1px solid #444; border-radius: 8px; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: center; }
        .box-panel h3 { margin: 0 0 10px 0; color: #d4af37; font-size: 14px;}

        .inputs { display: flex; justify-content: center; gap: 10px; align-items: center; font-size: 14px; }
        input[type="number"] { background: #222; color: #0f0; border: 1px solid #0ff; border-radius: 5px; width: 45px; height: 30px; font-size: 16px; text-align: center; font-weight: bold; outline: none; }

        .main-controls { display: flex; gap: 10px; width: 100%; margin-bottom: 10px;}
        .btn-start { background: linear-gradient(180deg, #00c853, #00838f); color: white; border: none; padding: 12px; font-size: 12px; font-weight: bold; border-radius: 8px; flex: 2; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,200,83,0.5); transition: 0.2s; }
        .btn-end { background: linear-gradient(180deg, #d32f2f, #8e0000); color: white; border: none; padding: 12px; font-size: 12px; font-weight: bold; border-radius: 8px; flex: 1; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(211,47,47,0.5); transition: 0.2s; }
        .btn-start:hover, .btn-end:hover { transform: scale(1.02); }
        .btn-start:active, .btn-end:active { transform: scale(0.95); }

        .section-title { color: #aaa; font-size: 11px; margin: 5px 0 5px 0; text-transform: uppercase; width: 100%; text-align: left; border-bottom: 1px solid #333; padding-bottom: 3px;}

        .host-profile { display: flex; flex-direction: column; gap: 5px; width: 100%; text-align: left; margin-bottom: 10px; }
        .host-profile input { background: #111; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 5px; font-size: 12px; outline: none; }
        .host-profile input:focus { border-color: #0ff; }
        .btn-save-host { background: #444; color: #0ff; border: 1px solid #0ff; padding: 8px; font-size: 11px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; transition: 0.2s;}
        .btn-save-host:hover { background: #0ff; color: #000; }

        .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; text-align: left;}
        .cfg-item { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 5px 10px; border-radius: 5px; border: 1px solid #333;}
        .cfg-item label { font-size: 11px; color: #ccc; font-weight: bold;}
        .cfg-item input, .cfg-item select { width: 50px; height: 22px; font-size: 12px; background: #222; color:#0f0; border: 1px solid #0ff; outline:none; border-radius: 3px; font-weight: bold;}
        .btn-save-cfg { background: #444; color: #fff; border: 1px solid #666; padding: 8px; font-size: 11px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; transition: 0.2s;}
        .btn-save-cfg:hover { background: #0ff; color: #000; border-color: #0ff;}

        .admin-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 100%; margin-bottom: 5px;}
        .admin-tools button { background: #333; color: #fff; border: 1px solid #555; padding: 8px; font-size: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .admin-tools button:hover { background: #555; border-color: #0ff; }

        .window-tools { display: flex; gap: 5px; width: 100%; margin-bottom: 10px; }
        .window-tools button { flex: 1; background: #112244; color: #0ff; border: 1px solid #0ff; padding: 8px; font-size: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .window-tools button:hover { background: #0ff; color: #000; }

        .license-box { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 10px; width: 100%; box-sizing: border-box; text-align: center; }
        .license-box h3 { margin: 0 0 5px 0; font-size: 12px; color: #aaa; }
        #lic-status { color: #d4af37; font-size: 12px; margin: 0 0 10px 0; font-weight: bold;}
        .lic-inputs { display: flex; gap: 5px; justify-content: center; }
        .lic-inputs input { background: #000; color: #fff; border: 1px solid #555; border-radius: 5px; padding: 6px; flex: 1; font-size: 11px; outline: none; font-weight: bold; text-transform: uppercase;}
        .lic-inputs button { background: #d4af37; color: #000; font-weight: bold; font-size: 11px; border: none; border-radius: 5px; padding: 6px 10px; cursor: pointer; }
        .lic-inputs button:hover { background: #ffea00; }
    </style>
</head>
<body>
    <h1>Painel do Host</h1>

    <div class="box-panel">
        <h3>Tempo da Batalha</h3>
        <div class="inputs">
            <input type="number" id="min" value="2" min="0"> Min
            <input type="number" id="seg" value="0" min="0" max="59"> Seg
        </div>
    </div>

    <div class="main-controls">
        <button class="btn-start" onclick="iniciarArena()">▶ Iniciar</button>
        <button class="btn-end" onclick="finalizarArena()">🛑 Finalizar</button>
    </div>

    <div class="section-title">👤 Identidade do Host (Seus Clones)</div>
    <div class="host-profile">
        <input type="text" id="host-name" placeholder="Seu Nome (Ex: @Host_Gamer)">
        <input type="text" id="host-avatar" placeholder="URL da sua Foto (Opcional)">
        <button class="btn-save-host" onclick="salvarPerfilHost(this)">💾 Aplicar Identidade</button>
    </div>

    <div class="section-title">💰 Preços dos Poderes</div>
    <div class="cfg-grid">
        <div class="cfg-item"><label>Nv 1 (Veloc.)</label><input type="number" id="cfg-t1" value="1"></div>
        <div class="cfg-item"><label>Nv 2 (Cura)</label><input type="number" id="cfg-t2" value="5"></div>
        <div class="cfg-item"><label>Nv 3 (Raios)</label><input type="number" id="cfg-t3" value="10"></div>
        <div class="cfg-item"><label>Nv 4 (Meteoro)</label><input type="number" id="cfg-t4" value="20"></div>
        <div class="cfg-item"><label style="color:#ff0050;">👹 CHEFÃO</label><input type="number" id="cfg-boss" value="50"></div>
        <div class="cfg-item"><label style="color:#0ff;">🌌 TITÃ</label><input type="number" id="cfg-titan" value="150"></div>
        <div class="cfg-item"><label style="color:#ffea00;">✨ ANGELICAL</label><input type="number" id="cfg-angelical" value="300"></div>
        <div class="cfg-item">
            <label>Limites</label>
            <select id="cfg-multiboss" style="width: 70px;">
                <option value="false">1 por vez</option>
                <option value="true">Múltiplos</option>
            </select>
        </div>
    </div>
    <button class="btn-save-cfg" onclick="salvarConfigGifts(this)">💾 Aplicar Preços & Limites</button>

    <div class="section-title" style="margin-top: 10px;">📊 Controle do Ranking</div>
    <div class="cfg-grid">
        <div class="cfg-item">
            <label>Mostrar</label>
            <select id="cfg-rank-mode" style="width:80px;">
                <option value="auto">Girar Tudo</option>
                <option value="pts">Só Pontos</option>
                <option value="kills">Só Abates</option>
                <option value="gifts">Só Moedas</option>
            </select>
        </div>
        <div class="cfg-item"><label>Tempo (s)</label><input type="number" id="cfg-rank-time" value="5"></div>
    </div>
    <button class="btn-save-cfg" onclick="salvarConfigRanking(this)">🔄 Aplicar no Ranking</button>

    <div class="section-title" style="margin-top: 10px;">Interações Manuais</div>
    <div class="admin-tools">
        <button onclick="enviarAcao('spawnBot')">+ Add Clone</button>
        <button onclick="enviarAcao('forceGift')">+ Dar Poder</button>
        <button onclick="enviarAcao('forceBoss')" style="color:#ff0050;">👹 Virar Chefão</button>
        <button onclick="enviarAcao('forceTitan')" style="color:#0ff;">🌌 Virar Titã</button>
        <button onclick="enviarAcao('forceAngelical')" style="grid-column: span 2; color:#ffea00;">✨ ASCENSÃO ANGELICAL</button>
        <button style="grid-column: span 2;" onclick="enviarAcao('triggerMeteorShower')">☄️ Disparar Meteoro Global</button>
    </div>

    <div class="license-box">
        <h3>STATUS DA CONTA RDM</h3>
        <p id="lic-status">⏳ Verificando login...</p>
    </div>

    <script>
        // 🧠 PONTE DE COMANDO: Envia ordens para a Arena
        function sendCommand(action, value = null) {
            localStorage.setItem('stickmanCommand', JSON.stringify({ ts: Date.now(), action: action, value: value }));
        }

        window.onload = () => {
            let savedGift = localStorage.getItem('gift_config');
            if(savedGift) {
                let cfg = JSON.parse(savedGift);
                document.getElementById('cfg-t1').value = cfg.t1 || 1;
                document.getElementById('cfg-t2').value = cfg.t2 || 5;
                document.getElementById('cfg-t3').value = cfg.t3 || 10;
                document.getElementById('cfg-t4').value = cfg.t4 || 20;
                document.getElementById('cfg-boss').value = cfg.boss || 50;
                document.getElementById('cfg-titan').value = cfg.titan || 150;
                document.getElementById('cfg-angelical').value = cfg.angelical || 300;
                document.getElementById('cfg-multiboss').value = cfg.multiBoss === true || cfg.multiBoss === 'true' ? 'true' : 'false';
            }

            let savedRank = localStorage.getItem('ranking_config');
            if(savedRank) {
                let cfg = JSON.parse(savedRank);
                document.getElementById('cfg-rank-mode').value = cfg.mode || 'auto';
                document.getElementById('cfg-rank-time').value = cfg.time || 5;
            }

            let savedHost = localStorage.getItem('host_profile');
            if(savedHost) {
                let cfg = JSON.parse(savedHost);
                document.getElementById('host-name').value = cfg.name || '';
                document.getElementById('host-avatar').value = cfg.avatar || '';
            }

            setTimeout(() => { salvarConfigGifts(); salvarConfigRanking(); salvarPerfilHost(); }, 1500);

            // Verifica o status da RDM Studio em vez de chave de licença local
            verificarStatusRDM();
            setInterval(verificarStatusRDM, 5000);
        }

        function animarBotao(btn) {
            if(!btn) return; let txtOriginal = btn.innerText; btn.innerText = "✅ Salvo!";
            setTimeout(() => { btn.innerText = txtOriginal; }, 1500);
        }

        function salvarConfigGifts(btn) {
            let cfg = {
                t1: parseInt(document.getElementById('cfg-t1').value) || 1,
                t2: parseInt(document.getElementById('cfg-t2').value) || 5,
                t3: parseInt(document.getElementById('cfg-t3').value) || 10,
                t4: parseInt(document.getElementById('cfg-t4').value) || 20,
                boss: parseInt(document.getElementById('cfg-boss').value) || 50,
                titan: parseInt(document.getElementById('cfg-titan').value) || 150,
                angelical: parseInt(document.getElementById('cfg-angelical').value) || 300,
                multiBoss: document.getElementById('cfg-multiboss').value === 'true'
            };
            localStorage.setItem('gift_config', JSON.stringify(cfg));
            sendCommand('update_gift_config', cfg);
            animarBotao(btn);
        }

        function salvarConfigRanking(btn) {
            let cfg = { mode: document.getElementById('cfg-rank-mode').value, time: parseInt(document.getElementById('cfg-rank-time').value) || 5 };
            localStorage.setItem('ranking_config', JSON.stringify(cfg));
            sendCommand('update_ranking_config', cfg);
            animarBotao(btn);
        }

        function salvarPerfilHost(btn) {
            let cfg = { name: document.getElementById('host-name').value.trim(), avatar: document.getElementById('host-avatar').value.trim() };
            localStorage.setItem('host_profile', JSON.stringify(cfg));
            sendCommand('update_host_profile', cfg);
            animarBotao(btn);
        }

        function iniciarArena() {
            let m = parseInt(document.getElementById('min').value) || 0; let s = parseInt(document.getElementById('seg').value) || 0; let totalSegundos = (m * 60) + s;
            if (totalSegundos <= 0) { alert("Tempo inválido!"); return; }
            sendCommand('host_start_match', totalSegundos);
            salvarConfigGifts(); salvarConfigRanking(); salvarPerfilHost();
        }

        function finalizarArena() { if(confirm("Encerrar partida agora?")) { sendCommand('host_end_match', null); } }
        function enviarAcao(acao) { sendCommand('host_action', acao); }


        function verificarStatusRDM() {
            let user = localStorage.getItem('rdm_user');
            let perfil = localStorage.getItem('rdm_perfil');
            let st = document.getElementById('lic-status');
            if (user && perfil) {
                st.innerText = `✅ Logado como: ${user} (${perfil.toUpperCase()})`;
                st.style.color = "#0f0";
            } else {
                st.innerText = "❌ Jogo Desconectado. Faça login no site RDM Studio.";
                st.style.color = "#f00";
            }
        }

        function ativarChaveHost() {
            alert("⚠️ A ativação por chave não é mais usada.\nO jogo é validado automaticamente pelo seu login no site da RDM Studio.");
        }
    </script>
</body>
</html>
